<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Analyzer Dashboard</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Advertisement Intelligence Dashboard</h1>
        <p>Upload ad media and run local Qwen-VL + Whisper inference.</p>
      </header>

      <section class="card">
        <h2>Upload</h2>
        <div id="dropZone" class="drop-zone">
          <p>Drag & drop files here (jpg, png, webp, mp3, wav, m4a, ogg)</p>
          <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.mp3,.wav,.m4a,.ogg" />
        </div>
        <div class="controls">
          <label for="precisionMode">Precision:</label>
          <select id="precisionMode">
            <option value="fast">Fast</option>
            <option value="balanced" selected>Balanced</option>
            <option value="precise">Precise</option>
          </select>
          <button id="startBtn">Start Processing</button>
        </div>
        <ul id="fileList"></ul>
      </section>

      <section class="card">
        <h2>Processing</h2>
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        <p id="progressText">0%</p>
        <pre id="logBox" class="logs"></pre>
      </section>

      <section class="card">
        <h2>Results</h2>
        <div id="resultsGrid" class="results-grid"></div>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
