<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Intelligence Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Ad Intelligence Analyzer</h1>
      <p class="subtitle">Local Qwen 2.5 VL + Whisper pipeline for marketing signal extraction.</p>

      <section class="card">
        <h2>Upload</h2>
        <div id="dropzone" class="dropzone">Drag & drop JPG, PNG, WEBP files here or click to pick.</div>
        <input id="fileInput" type="file" multiple accept=".jpg,.jpeg,.png,.webp" hidden />

        <div class="controls">
          <label for="precision">Precision</label>
          <select id="precision">
            <option value="fast">Fast</option>
            <option value="balanced" selected>Balanced</option>
            <option value="precise">Precise</option>
          </select>
          <button id="startBtn">Start Processing</button>
        </div>

        <div id="uploadProgressWrap" class="progress-wrap hidden">
          <div id="uploadProgressBar" class="progress-bar"></div>
        </div>
        <ul id="fileList"></ul>
      </section>

      <section class="card">
        <h2>Processing</h2>
        <div class="progress-wrap">
          <div id="jobProgressBar" class="progress-bar"></div>
        </div>
        <p id="jobProgressText">No active job.</p>
        <pre id="logs" class="logs"></pre>
      </section>

      <section class="card">
        <h2>Results</h2>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
