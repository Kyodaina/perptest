<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Analyzer Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Advertisement Analyzer</h1>

      <section class="card">
        <h2>Upload View</h2>
        <div id="dropzone" class="dropzone">Drag & drop videos/images here</div>
        <input id="fileInput" type="file" multiple accept=".jpg,.jpeg,.png,.webp,.mp4,.mov,.avi" />
        <div class="row">
          <select id="modelFamily">
            <option value="qwen2.5-vl">Qwen2.5-VL</option>
            <option value="llava">LLaVA</option>
          </select>
          <select id="modelSize">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
          <select id="precision">
            <option value="fast">Fast</option>
            <option value="balanced" selected>Balanced</option>
            <option value="precise">Precise</option>
          </select>
          <button id="startBtn">Start</button>
        </div>
        <ul id="fileList"></ul>
        <div id="uploadProgress" class="progress"><div></div></div>
      </section>

      <section class="card">
        <h2>Processing View</h2>
        <div id="processProgress" class="progress"><div></div></div>
        <pre id="logs"></pre>
      </section>

      <section class="card">
        <h2>Results View</h2>
        <div id="results"></div>
      </section>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
