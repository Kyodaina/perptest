<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magyar Hang Leirat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Magyar hangfájl leiratkészítő</h1>
      <input id="audioFile" type="file" accept=".wav,.mp3,.m4a" />
      <button id="startBtn">Feldolgozás</button>
      <p id="status">Státusz: várakozás</p>
      <div class="progress-wrap"><div id="bar"></div></div>
      <pre id="transcript"></pre>
      <div class="actions">
        <button id="txtBtn" disabled>TXT export</button>
        <button id="pdfBtn" disabled>PDF export</button>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
